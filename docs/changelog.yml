# use PR ID as changelog filename
filename: pr

products:
  default:
    - product: edot-java
      lifecycle: ga

# extract context from PR (title, description, linked issues, ...)
extract:
  # there are no 'release notes' section in PR descriptions, so we can skip it
  release_notes: false
  # extract linked issues from PR descriptions
  issues: true

# mapping from PR labels to changelog type
pivot:
  types:
    breaking-change: "breaking-change"
    bug-fix: "bug"
    deprecation: "deprecation"
    feature: "feature"
    enhancement: "enhancement"
    docs: "docs, documentation"
    # those types should be used after the release is published, they allow to amend existing bundles
    # TODO: investigate what is the expected workflow for those and how to amend existing bundles
    known-issue:
    regression:
    security:

rules:
  create:
    exclude: "chore"

bundle:
  # TODO: evaluate if there any benefits to using nested folders here, for example
  # docs/changelog for changelog entries
  # docs/changelog/bundles for bundles
  directory: docs/changelog
  output_directory: docs/releases
  resolve: true
  repo: elastic-otel-java
  owner: elastic

  # Named bundle profiles for different release scenarios.
  # Profiles can be used with both 'changelog bundle' and 'changelog remove':
  #   docs-builder changelog bundle elasticsearch-release 9.2.0
  #   docs-builder changelog remove elasticsearch-release 9.2.0
  # When used with 'changelog remove', only the 'products' field is applied.
  # The 'output', 'output_products', 'repo', 'owner', and 'hide_features' fields are
  # bundle-specific and are ignored for removal.
  profiles:
    # Example: Edot-java release profile (filter by changelog fields)
    edot-java-release:
      # Filter: which input changelogs to include ({version} and {lifecycle} are substituted at runtime)
      products: "edot-java {version} {lifecycle}"
      # Output filename ({version} is substituted at runtime)
      output: "{version}.yaml"
      # Optional: override the products array written to the bundle output.
      # output_products: "edot-java {version}"
    #   # Feature IDs to hide when bundling with this profile (accepts string or list)
    #   hide_features:
    #     - feature-flag-1
    #     - feature-flag-2