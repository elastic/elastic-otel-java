name: changelog-upstream-update

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:

  submit:
    permissions:
      contents: write
      pull-requests: write
    # only generate changelog when PR:
    # - and has proper label for upstream update
    # - is not from a fork (as we need to commit and push to it)
    if: >
      contains(github.event.pull_request.labels.*.name, 'changelog:upstream-update')
      && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OBS_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.OBS_AUTOMATION_APP_PEM }}
          permission-contents: write
          permission-pull-requests: write
          repositories: |
            elastic-otel-java
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.get_token.outputs.token }}
      - name: Git setup
        uses: elastic/oblt-actions/git/setup@v1
        with:
          github-token: ${{ steps.get_token.outputs.token }}
      - name: Docs builder setup
        uses: elastic/docs-actions/docs-builder/setup@v1

      - name: Generate changelog entry
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          description="- $("./gradlew" -q changelogUpstreamDependenciesOneLiner)"
          docs-builder changelog add \
            --concise \
            --title "${PR_TITLE}" \
            --type enhancement \
            --prs "${PR_URL}" \
            --products "edot-java NEXT ga" \
            --output "${temp_dir}" \
            --description "${description}"
          # will overwrite any prior update, if there is any
          mv "docs/changelog/${PR_NUMBER}.yaml" "docs/changelog/upstream-update.yaml"
          git diff --quiet
          if [[ 0 == $? ]]
          then
            echo "nothing to commit"
          else
            git add --all ./docs/changelog/
            git commit -m "Add changelog for upstream update"
            git push
          fi
