name: changelog-submit

on:
  workflow_run:
    workflows: [changelog-validate]
    types:
      - completed

permissions:
  contents: read

jobs:
  submit:
    permissions:
      contents: write
      pull-requests: write
    # TODO: we want to skip this for upstream update PRs, but we don't have access
    # to the PR details like labels, how can we do that ?
    uses: elastic/docs-actions/.github/workflows/changelog-submit.yml@v1
