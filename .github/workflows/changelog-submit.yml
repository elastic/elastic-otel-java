name: changelog-submit

on:
  workflow_run:
    workflows: [changelog-validate]
    types:
      - completed

permissions:
  contents: read

jobs:
  submit:
    permissions:
      contents: write
      pull-requests: write
    if: contains(github.event.pull_request.labels.*.name, 'changelog:upstream-update') == false
    uses: elastic/docs-actions/.github/workflows/changelog-submit.yml@v1
